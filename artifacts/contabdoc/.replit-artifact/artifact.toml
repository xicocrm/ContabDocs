kind = "web"
previewPath = "/"
title = "ContabDOC"
version = "1.0.0"
id = "artifacts/contabdoc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23285

[services.development]
run = "pnpm --filter @workspace/contabdoc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/contabdoc", "run", "build" ]
publicDir = "artifacts/contabdoc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23285"
BASE_PATH = "/"
